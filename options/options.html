<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>设置</title>
  <style>
    body {
      font-family: -apple-system, "Segoe UI", "PingFang SC", sans-serif;
      max-width: 480px;
      margin: 40px auto;
      padding: 0 16px;
    }
    label {
      display: block;
      margin-bottom: 6px;
      font-weight: bold;
    }
    input {
      width: 100%;
      box-sizing: border-box;
      padding: 8px;
      border: 1px solid #ddd;
      border-radius: 6px;
      margin-bottom: 12px;
    }
    button {
      padding: 8px 16px;
      border: none;
      border-radius: 6px;
      background: #2563eb;
      color: white;
      cursor: pointer;
    }
    .note {
      font-size: 12px;
      color: #666;
      margin-bottom: 16px;
    }
    .saved {
      color: green;
      font-size: 12px;
      margin-left: 8px;
    }
  </style>
</head>
<body>
  <h2>插件设置</h2>

  <label for="apiKey">Claude API Key</label>
  <input type="password" id="apiKey" placeholder="sk-ant-..." />
  <p class="note">
    API Key 仅保存在你本地浏览器的存储中,不会上传到任何第三方服务器。
    请前往 console.anthropic.com 获取你的 API Key。
  </p>

  <label for="trackerUrl">投递记录工具地址</label>
  <input type="text" id="trackerUrl" placeholder="http://localhost:3000" />
  <p class="note">
    用于「保存到投递记录」按钮。填你本地或部署的 job-tracker 地址，不含末尾斜杠，
    例如 http://localhost:3000。留空则默认 http://localhost:3000。
    注意：如果改成 localhost 以外的地址，需要同步在 manifest.json 的 host_permissions 里加上该来源。
  </p>

  <button id="saveBtn">保存</button>
  <span id="savedMsg" class="saved" style="display:none;">已保存</span>

  <script src="options.js"></script>
</body>
</html>
